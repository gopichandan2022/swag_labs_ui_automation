name: Playwright Tests

on:
  # Trigger the workflow manually
  workflow_dispatch:
  
  # Automatically trigger on push to the main branch
  push:
    branches:
      - main

  # Automatically trigger on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest  # You can change this to macos-latest or windows-latest if needed

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # You can change this to the Node.js version you prefer

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          npm install

      # Step 4: Install Playwright dependencies
      - name: Install Playwright dependencies
        run: |
          npx playwright install --with-deps

      # Step 5: Run the Playwright tests
      - name: Run Playwright tests
        run: |
          npx playwright test tests
